[deepseek_model]
type = deepseek
name = ds_v3
emb_dim = 7168
max_seq_len = 16384
vocab_size = 128256
attention_config = ds_kdn
moe_config = ds_moe
mlp_config = ds_mlp
rmsnorm_config = ds_norm

[ds_kdn]
type = kdn
name = ds_kdn
num_query_heads = 64
num_kv_heads = 8
state_dim = 256
chunk_size = 128
kernel_type = elu
low_rank_dim = 64

[ds_moe]
type = moe
name = ds_moe
n_routed_experts = 64
n_activated_experts = 6

[ds_mlp]
type = mlp
name = ds_mlp
dim = 18432

[ds_norm]
type = norm
name = ds_norm
epsilon = 1e-5
